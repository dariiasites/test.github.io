<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оформление заказа — TechStore</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo"><span class="logo-icon">⚡</span> TechStore</a>
      <nav class="nav">
        <a href="index.html">Главная</a>
        <a href="catalog.html">Каталог</a>
        <a href="about.html">О нас</a>
        <a href="contacts.html">Контакты</a>
      </nav>
      <div class="header-actions">
        <a href="cart.html" class="icon-btn">🛒<span class="cart-badge hidden">0</span></a>
        <button class="menu-toggle">☰</button>
      </div>
    </div>
  </header>

  <div class="container section">
    <div class="breadcrumbs">
      <a href="index.html">Главная</a><span>/</span>
      <a href="cart.html">Корзина</a><span>/</span>Оформление
    </div>
    <h1 class="section-title" style="text-align:left; margin-bottom: 24px;">Оформление заказа</h1>
    <div id="checkout-content"></div>
  </div>

  <footer class="footer">
    <div class="container"><div class="footer-bottom">© 2026 TechStore. Все права защищены.</div></div>
  </footer>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
  <script>
    const container = document.getElementById('checkout-content');

    if (!Cart.get().length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🛒</div><h2>Корзина пуста</h2><a href="catalog.html" class="btn btn-primary" style="margin-top:16px;">В каталог</a></div>`;
    } else {
      const total = Cart.total();
      const delivery = total > 50000 ? 0 : 500;

      container.innerHTML = `
        <form id="checkout-form" class="cart-layout" style="align-items: start;">
          <div class="cart-items" style="padding: 32px;">
            <h2 style="margin-bottom: 20px;">Контактные данные</h2>
            <div class="form-grid">
              <div class="form-group"><label class="form-label">Имя *</label><input class="form-input" name="firstName" required></div>
              <div class="form-group"><label class="form-label">Фамилия *</label><input class="form-input" name="lastName" required></div>
              <div class="form-group"><label class="form-label">Email *</label><input type="email" class="form-input" name="email" required></div>
              <div class="form-group"><label class="form-label">Телефон *</label><input type="tel" class="form-input" name="phone" placeholder="+7 (___) ___-__-__" required></div>
            </div>
            <h2 style="margin: 24px 0 20px;">Адрес доставки</h2>
            <div class="form-group"><label class="form-label">Город *</label><input class="form-input" name="city" required></div>
            <div class="form-group"><label class="form-label">Адрес *</label><input class="form-input" name="address" required></div>
            <div class="form-group"><label class="form-label">Комментарий</label><textarea class="form-textarea" name="comment" placeholder="Пожелания к заказу..."></textarea></div>
            <h2 style="margin: 24px 0 20px;">Способ оплаты</h2>
            <div class="filter-options">
              <label class="filter-option"><input type="radio" name="payment" value="card" checked> 💳 Банковская карта</label>
              <label class="filter-option"><input type="radio" name="payment" value="cash"> 💵 Наличные при получении</label>
              <label class="filter-option"><input type="radio" name="payment" value="sbp"> 📱 СБП</label>
            </div>
          </div>
          <div class="cart-summary">
            <h3>Ваш заказ</h3>
            ${Cart.get().map(i => {
              const p = PRODUCTS.find(p => p.id === i.id);
              return `<div class="summary-row"><span>${p.icon} ${p.name} × ${i.qty}</span><span>${formatPrice(p.price * i.qty)}</span></div>`;
            }).join('')}
            <div class="summary-row"><span>Товары</span><span>${formatPrice(total)}</span></div>
            <div class="summary-row"><span>Доставка</span><span>${delivery === 0 ? 'Бесплатно' : formatPrice(delivery)}</span></div>
            <div class="summary-row total"><span>Итого</span><span>${formatPrice(total + delivery)}</span></div>
            <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top: 20px;">Подтвердить заказ</button>
          </div>
        </form>`;

      document.getElementById('checkout-form').addEventListener('submit', e => {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(e.target));
        console.log('Заказ:', data);
        Cart.clear();
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">✅</div>
            <h2>Заказ успешно оформлен!</h2>
            <p style="margin: 12px 0 8px;">Спасибо, ${data.firstName}! Мы отправили подтверждение на ${data.email}</p>
            <p style="color: var(--text-soft); margin-bottom: 24px;">Номер заказа: #${Math.floor(Math.random() * 900000 + 100000)}</p>
            <a href="index.html" class="btn btn-primary btn-lg">На главную</a>
          </div>`;
      });
    }
  </script>
</body>
</html>
